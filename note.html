<link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

<style>

  @font-face {
    font-family: 'Paperozi';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-5Medium.woff2') format('woff2');
    font-weight: 500;

body{

table tbody tr.term-highlight td{

  <button
    class="btn btn-primary"
    onclick="searchTerm()">
    검색
  </button>

</div>

      </td>

        style="transform:scale(1.4);">
      </td>

      <td>와이파이 연결하기</td>

      <td>
        <a href="wifi.html"
        class="btn btn-primary review-btn">

        </a>
      </td>
    </tr>

    <tr>
      <td>
        <input type="checkbox"
        class="form-check-input"
        style="transform:scale(1.4);">
      </td>

      <td>QR코드 사용하기</td>

      <td>
        <a href="qr.html"
        class="btn btn-primary review-btn">
          복습하기
        </a>
      </td>
    </tr>

    <tr>
      <td>
        <input type="checkbox"
        class="form-check-input"
        style="transform:scale(1.4);">
      </td>

      <td>사진 보내기</td>

      <td>
        <a href="photo-send.html"

      </td>
    </tr>

    <tr>
      <td>
        <input type="checkbox"
        class="form-check-input"
        style="transform:scale(1.4);">
      </td>

      <td>삼성페이 사용하기</td>

      <td>
        <a href="samsungpay.html"
        class="btn btn-primary review-btn">

      </td>
    </tr>

    <tr>
      <td>
        <input type="checkbox"
        class="form-check-input"
        style="transform:scale(1.4);">
      </td>

      <td>알림 확인하기</td>

    <tr>

  </div>

  

  <div class="text-center mt-5 mb-5">


<a href="index.html" class="btn btn-secondary">
  홈으로 돌아가기
</a>


  </div>

</div>

<script>

function searchTerm(){

  const keyword =
    document.getElementById("searchInput")
    .value
    .trim()
    .toLowerCase();

  const rows =
    document.querySelectorAll("tbody tr");

  rows.forEach(row=>{
    row.classList.remove("term-highlight");
  });

  if(keyword==="") return;

  for(let row of rows){

    const text =
      row.children[1]
      .textContent
      .trim()
      .toLowerCase();

    if(text.includes(keyword)){

      row.classList.add("term-highlight");

      row.scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

      break;
    }

  }

}

</script>
